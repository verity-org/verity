name: Integer Build Image
run-name: "Build ${{ inputs.image }}:${{ inputs.version }}-${{ inputs.type }}"

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Image name (e.g., node)"
        required: true
      version:
        description: "Version (e.g., 22)"
        required: true
      type:
        description: "Type (e.g., default, dev, fips)"
        required: true
        default: "default"
      tags:
        description: "Comma-separated tags to publish (e.g., 22,latest)"
        required: true
      registry:
        description: "Target registry"
        required: true
        default: "ghcr.io/verity-org"

permissions:
  contents: write          # push-reports.sh writes to reports branch via GitHub API
  packages: write          # push to GHCR
  id-token: write          # keyless cosign signing
  attestations: write      # actions/attest SBOM

jobs:
  build:
    name: "Build ${{ inputs.image }}:${{ inputs.version }}-${{ inputs.type }}"
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: step-security/mise-action@d65cf9dcb78b983ae2530c89fd28e72286713505 # v3.5.1
        with:
          install: true
          cache: true

      # ── Setup ──────────────────────────────────────────────────────────────

      - name: Validate inputs
        env:
          INPUT_IMAGE: ${{ inputs.image }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TYPE: ${{ inputs.type }}
          INPUT_TAGS: ${{ inputs.tags }}
          INPUT_REGISTRY: ${{ inputs.registry }}
        run: |
          # Guard against shell injection via workflow_dispatch inputs.
          # Inputs are passed through env vars (not interpolated into the script)
          # and validated against their expected character sets before any use.
          check() {
            local label="$1" value="$2" pattern="$3"
            if [[ ! "$value" =~ $pattern ]]; then
              echo "Invalid ${label}: ${value}" >&2
              exit 1
            fi
          }
          check image    "$INPUT_IMAGE"    '^[a-z][a-z0-9-]*$'
          check version  "$INPUT_VERSION"  '^[a-zA-Z0-9][a-zA-Z0-9._-]*$'
          check type     "$INPUT_TYPE"     '^[a-z][a-z0-9-]*$'
          check tags     "$INPUT_TAGS"     '^[a-zA-Z0-9.,_-]+$'
          check registry "$INPUT_REGISTRY" '^[a-zA-Z0-9./:_-]+$'

      - name: Log in to GHCR
        uses: step-security/docker-login-action@c3e677aae8393bc9c81cfdf9709648720ea4bd4d # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/dev/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Build verity CLI
        run: go build -o verity .

      - name: Generate apko configs
        id: gen
        env:
          INPUT_IMAGE: ${{ inputs.image }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TYPE: ${{ inputs.type }}
          INPUT_TAGS: ${{ inputs.tags }}
          INPUT_REGISTRY: ${{ inputs.registry }}
        run: |
          # Generate all apko configs into ./gen/ with absolute include: paths
          # so apko can resolve them from any working directory.
          ./verity integer discover --gen-dir ./gen

          config="gen/${INPUT_IMAGE}/${INPUT_VERSION}/${INPUT_TYPE}.apko.yaml"
          if [ ! -f "$config" ]; then
            echo "Config not found: $config (image/version/type combination may not exist)" >&2
            exit 1
          fi
          echo "path=$config" >> "$GITHUB_OUTPUT"

          # Build space-separated image refs for all tags.
          refs=""
          IFS=',' read -ra TAGS <<< "$INPUT_TAGS"
          for tag in "${TAGS[@]}"; do
            tag="${tag// /}"
            ref="${INPUT_REGISTRY}/${INPUT_IMAGE}:${tag}"
            refs="${refs:+$refs }$ref"
          done
          echo "refs=$refs" >> "$GITHUB_OUTPUT"
          echo "primary_tag=${TAGS[0]// /}" >> "$GITHUB_OUTPUT"

      - name: Read image metadata
        id: meta
        env:
          INPUT_IMAGE: ${{ inputs.image }}
        run: |
          image_yaml="images/${INPUT_IMAGE}.yaml"
          title=$(yq '.name' "$image_yaml")
          description=$(yq '.description' "$image_yaml")
          echo "title=${title}" >> "$GITHUB_OUTPUT"
          echo "description=${description}" >> "$GITHUB_OUTPUT"

      # ── Melange (custom package build) ──────────────────────────────────

      - name: Check if melange build needed
        id: melange-check
        env:
          INPUT_IMAGE: ${{ inputs.image }}
          INPUT_TYPE: ${{ inputs.type }}
        run: |
          image_yaml="images/${INPUT_IMAGE}.yaml"
          melange_block=$(yq -e ".types.${INPUT_TYPE}.melange" "$image_yaml" 2>/dev/null) || true
          if [ -z "$melange_block" ] || [ "$melange_block" = "null" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Melange build not needed for ${INPUT_IMAGE}:${INPUT_TYPE}"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            upstream=$(yq ".types.${INPUT_TYPE}.melange.upstream // \"\"" "$image_yaml")
            bespoke=$(yq ".types.${INPUT_TYPE}.melange.bespoke // \"\"" "$image_yaml")
            env_file=$(yq ".types.${INPUT_TYPE}.melange.env-file // \"\"" "$image_yaml")
            build_option=$(yq ".types.${INPUT_TYPE}.melange.build-option // \"\"" "$image_yaml")
            echo "upstream=${upstream}" >> "$GITHUB_OUTPUT"
            echo "bespoke=${bespoke}" >> "$GITHUB_OUTPUT"
            echo "env_file=${env_file}" >> "$GITHUB_OUTPUT"
            echo "build_option=${build_option}" >> "$GITHUB_OUTPUT"
            echo "Melange build needed: upstream=${upstream} bespoke=${bespoke}"
          fi

      - name: Setup QEMU for multi-arch melange build
        if: steps.melange-check.outputs.needed == 'true'
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
        with:
          platforms: arm64

      - name: Resolve melange YAML source
        if: steps.melange-check.outputs.needed == 'true'
        id: melange-source
        env:
          UPSTREAM: ${{ steps.melange-check.outputs.upstream }}
          BESPOKE: ${{ steps.melange-check.outputs.bespoke }}
        run: |
          mkdir -p melange-work

          if [ -n "$BESPOKE" ]; then
            # Tier 3: fully custom YAML from packages/bespoke/
            cp "packages/bespoke/${BESPOKE}" melange-work/build.yaml
            echo "source=bespoke" >> "$GITHUB_OUTPUT"
          elif [ -n "$UPSTREAM" ]; then
            # Tier 1/2: fetch from wolfi-dev/os at pinned commit
            commit=$(jq -r '.wolfi_commit' packages/upstream.lock.json)
            file=$(jq -r --arg pkg "$UPSTREAM" '.packages[$pkg].file' packages/upstream.lock.json)
            if [ "$file" = "null" ] || [ -z "$file" ]; then
              echo "Package '${UPSTREAM}' not found in upstream.lock.json" >&2
              exit 1
            fi
            url="https://raw.githubusercontent.com/wolfi-dev/os/${commit}/${file}"
            echo "Fetching upstream melange YAML: ${url}"
            curl -fsSL "$url" -o melange-work/build.yaml
            echo "source=upstream" >> "$GITHUB_OUTPUT"
          fi
          echo "yaml=melange-work/build.yaml" >> "$GITHUB_OUTPUT"

      - name: Generate ephemeral melange signing key
        if: steps.melange-check.outputs.needed == 'true'
        run: |
          melange keygen --keyname melange-work/melange

      - name: Build melange package
        if: steps.melange-check.outputs.needed == 'true'
        env:
          MELANGE_YAML: ${{ steps.melange-source.outputs.yaml }}
          ENV_FILE: ${{ steps.melange-check.outputs.env_file }}
          BUILD_OPTION: ${{ steps.melange-check.outputs.build_option }}
        run: |
          MELANGE_ARGS=(
            build "$MELANGE_YAML"
            --arch amd64,arm64
            --signing-key melange-work/melange.rsa
            --out-dir packages/repo
          )

          if [ -n "$ENV_FILE" ]; then
            MELANGE_ARGS+=(--env-file "packages/overrides/${ENV_FILE}")
          fi
          if [ -n "$BUILD_OPTION" ]; then
            MELANGE_ARGS+=(--build-option "$BUILD_OPTION")
          fi

          echo "Running: melange ${MELANGE_ARGS[*]}"
          melange "${MELANGE_ARGS[@]}"

      - name: Inject melange repo into apko config
        if: steps.melange-check.outputs.needed == 'true'
        env:
          CONFIG_PATH: ${{ steps.gen.outputs.path }}
        run: |
          REPO_PATH="@local ${GITHUB_WORKSPACE}/packages/repo"
          KEY_PATH="${GITHUB_WORKSPACE}/melange-work/melange.rsa.pub"

          yq -i "
            .contents.repositories += [\"${REPO_PATH}\"] |
            .contents.keyring += [\"${KEY_PATH}\"]
          " "$CONFIG_PATH"

          echo "Injected local melange repo into apko config:"
          yq '.contents' "$CONFIG_PATH"

      # ── Build ──────────────────────────────────────────────────────────────

      - name: Build and publish multi-arch image
        id: build
        env:
          INPUT_IMAGE: ${{ inputs.image }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_REGISTRY: ${{ inputs.registry }}
          PRIMARY_TAG: ${{ steps.gen.outputs.primary_tag }}
          REFS: ${{ steps.gen.outputs.refs }}
          OCI_TITLE: ${{ steps.meta.outputs.title }}
          OCI_DESCRIPTION: ${{ steps.meta.outputs.description }}
          CONFIG_PATH: ${{ steps.gen.outputs.path }}
        run: |
          # Inject dynamic OCI annotations into a temp copy of the generated config.
          # The generated config uses absolute include: paths so apko can resolve
          # them without needing to cd into the config directory.
          BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          export BUILD_TIMESTAMP
          tmpconfig=$(mktemp --suffix=.apko.yaml)
          cp "$CONFIG_PATH" "$tmpconfig"
          yq -i '
            .annotations["org.opencontainers.image.title"]       = strenv(OCI_TITLE) |
            .annotations["org.opencontainers.image.description"] = strenv(OCI_DESCRIPTION) |
            .annotations["org.opencontainers.image.version"]     = strenv(INPUT_VERSION) |
            .annotations["org.opencontainers.image.revision"]    = strenv(GITHUB_SHA) |
            .annotations["org.opencontainers.image.created"]     = strenv(BUILD_TIMESTAMP)
          ' "$tmpconfig"

          # Split refs into an array for safe expansion (one arg per ref).
          read -ra REFSARR <<< "$REFS"

          apko publish \
            --arch amd64,arm64 \
            --sbom-path "$GITHUB_WORKSPACE" \
            "$tmpconfig" \
            "${REFSARR[@]}"

          rm -f "$tmpconfig"

          # Capture the digest of the published index for signing
          digest=$(crane digest "${INPUT_REGISTRY}/${INPUT_IMAGE}:${PRIMARY_TAG}")
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      # ── Security scan ──────────────────────────────────────────────────────

      - name: Trivy vulnerability scan
        env:
          INPUT_IMAGE: ${{ inputs.image }}
          INPUT_REGISTRY: ${{ inputs.registry }}
          PRIMARY_TAG: ${{ steps.gen.outputs.primary_tag }}
        run: |
          trivy image \
            --exit-code 0 \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --vuln-type os,library \
            --format json \
            --output trivy-report.json \
            "${INPUT_REGISTRY}/${INPUT_IMAGE}:${PRIMARY_TAG}"
        continue-on-error: true  # Report only — images publish even with CVEs

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: "trivy-${{ inputs.image }}-${{ inputs.version }}-${{ inputs.type }}"
          path: trivy-report.json
          retention-days: 30

      # ── Sign & attest ──────────────────────────────────────────────────────

      - name: Sign image with cosign (keyless)
        env:
          INPUT_IMAGE: ${{ inputs.image }}
          INPUT_REGISTRY: ${{ inputs.registry }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          # Sign by digest — immutable reference that covers all tags pointing to this image.
          cosign sign --yes "${INPUT_REGISTRY}/${INPUT_IMAGE}@${DIGEST}"

      - name: Attest SBOM
        if: hashFiles('sbom-amd64.spdx.json') != ''
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ inputs.registry }}/${{ inputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          predicate-type: https://spdx.dev/Document
          predicate-path: sbom-amd64.spdx.json
          push-to-registry: true

      # ── Report ─────────────────────────────────────────────────────────────

      - name: Push build report to reports branch
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_IMAGE: ${{ inputs.image }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TYPE: ${{ inputs.type }}
          INPUT_TAGS: ${{ inputs.tags }}
          INPUT_REGISTRY: ${{ inputs.registry }}
          DIGEST: ${{ steps.build.outputs.digest }}
          JOB_STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
        run: |
          status="success"
          if [ "$JOB_STATUS" != "success" ]; then
            status="failure"
          fi

          report=$(jq -n \
            --arg image    "$INPUT_IMAGE" \
            --arg version  "$INPUT_VERSION" \
            --arg type     "$INPUT_TYPE" \
            --arg tags     "$INPUT_TAGS" \
            --arg registry "$INPUT_REGISTRY" \
            --arg digest   "$DIGEST" \
            --arg status   "$status" \
            --arg built_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run_id   "$RUN_ID" \
            '{image: $image, version: $version, type: $type, tags: ($tags | split(",")),
              registry: $registry, digest: $digest, status: $status,
              built_at: $built_at, run_id: $run_id}')

          echo "$report" > report.json
          bash .github/scripts/push-reports.sh \
            "reports/${INPUT_IMAGE}/${INPUT_VERSION}/${INPUT_TYPE}/latest.json" \
            report.json

      - name: Update preflight manifest
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_IMAGE: ${{ inputs.image }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TYPE: ${{ inputs.type }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          MANIFEST_FILE="reports/preflight-manifest.json"
          BRANCH="reports"
          REPO="${{ github.repository }}"
          KEY="${INPUT_IMAGE}/${INPUT_VERSION}-${INPUT_TYPE}"
          MAX_RETRIES=5

          MANIFEST_UPDATED=false
          for attempt in $(seq 1 "$MAX_RETRIES"); do
            if gh api "repos/${REPO}/contents/${MANIFEST_FILE}?ref=${BRANCH}" > /tmp/manifest_resp.json 2>&1; then
              SHA=$(jq -r '.sha' /tmp/manifest_resp.json)
              CONTENT=$(jq -r '.content' /tmp/manifest_resp.json | base64 -d)
            elif grep -q '"Not Found"' /tmp/manifest_resp.json 2>/dev/null; then
              SHA=""
              CONTENT="{}"
            else
              echo "Warning: unexpected API response fetching manifest (attempt ${attempt}/${MAX_RETRIES})"
              cat /tmp/manifest_resp.json >&2
              sleep 2
              continue
            fi

            UPDATED=$(echo "$CONTENT" | jq \
              --arg key "$KEY" \
              --arg digest "$DIGEST" \
              --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '.[$key] = {upstream_digest: $digest, patched_vulns: 0, last_patched: $ts}')

            ENCODED=$(echo "$UPDATED" | base64 | tr -d '\n')
            ARGS=(--method PUT "repos/${REPO}/contents/${MANIFEST_FILE}"
              --field "message=chore: update preflight manifest for ${KEY}"
              --field "content=${ENCODED}"
              --field "branch=${BRANCH}")
            [ -n "$SHA" ] && ARGS+=(--field "sha=${SHA}")

            if gh api "${ARGS[@]}" --silent; then
              MANIFEST_UPDATED=true
              break
            fi

            echo "Warning: manifest update attempt ${attempt}/${MAX_RETRIES} failed (SHA conflict), retrying..."
            sleep 2
          done
          if [ "$MANIFEST_UPDATED" != "true" ]; then
            echo "::warning::Preflight manifest update failed after ${MAX_RETRIES} attempts"
          fi
