name: PR Test

# Lightweight PR validation: discover (validates config) + integer smoke tests.
# Full Copa patch pipeline runs nightly via orchestrator.yaml — NOT on PRs.

on:
  pull_request:
    paths:
      - 'copa-config.yaml'
      - 'images/**'
      - 'integer.yaml'
      - '.github/workflows/pr-test.yaml'
      - '.github/workflows/patch-image.yaml'
      - '.github/workflows/integer-*.yaml'
      - 'internal/integer/**'
      - 'cmd/integer*.go'
      - 'cmd/discover*.go'
      - 'cmd/scan*.go'

permissions:
  contents: read

env:
  TARGET_REGISTRY: ghcr.io/verity-org

jobs:
  # ── Validate discovery works ───────────────────────────────────────
  discover:
    name: Discover Images
    runs-on: ubuntu-24.04

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: step-security/mise-action@d65cf9dcb78b983ae2530c89fd28e72286713505 # v3.5.1
        with:
          install: true
          cache: true

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/dev/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Build verity
        run: go build -o verity .

      - name: Discover images
        run: |
          ./verity discover \
            --config copa-config.yaml \
            --target-registry "${TARGET_REGISTRY}" \
            > images.json

          COUNT=$(jq 'length' images.json)
          echo "✓ Discovered ${COUNT} image+tag combos"
          jq -r '.[] | "  - \(.name): \(.source)"' images.json

  # ── Validate all integer image configs ─────────────────────────────────
  validate:
    name: Validate image configs
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: step-security/mise-action@d65cf9dcb78b983ae2530c89fd28e72286713505 # v3.5.1
        with:
          install: true
          cache: true

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/dev/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Build verity CLI
        run: go build -o verity .

      - name: Validate all image configs
        run: ./verity integer validate

  # ── Integer (Wolfi-based) smoke test ─────────────────────────────────
  integer-smoke-test:
    name: "Integer ${{ matrix.image }}:${{ matrix.version }}-${{ matrix.type }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: golang
            version: "1.24"
            type: fips
          - image: node
            version: "22"
            type: dev

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: step-security/mise-action@d65cf9dcb78b983ae2530c89fd28e72286713505 # v3.5.1
        with:
          install: true
          cache: true

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/dev/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Build verity CLI
        run: go build -o verity .

      - name: Generate apko config and build image (local, no push)
        run: |
          ./verity integer discover --gen-dir ./gen

          config="gen/${{ matrix.image }}/${{ matrix.version }}/${{ matrix.type }}.apko.yaml"
          if [ ! -f "$config" ]; then
            echo "Config not found: $config" >&2
            exit 1
          fi

          apko build \
            --arch amd64 \
            "$config" \
            "${{ matrix.image }}:smoke-test" \
            "$GITHUB_WORKSPACE/image.tar"

      - name: Trivy vulnerability scan
        run: |
          trivy image \
            --exit-code 0 \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --vuln-type os,library \
            --format json \
            --output trivy-report.json \
            --input image.tar
        continue-on-error: true

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: "trivy-${{ matrix.image }}-${{ matrix.version }}-${{ matrix.type }}"
          path: trivy-report.json
          retention-days: 7
