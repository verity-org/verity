name: Integer Catalog

# Generates catalog.json from image definitions + build reports and pushes it
# to the reports branch so the website can render the integer (Wolfi-based) section.

on:
  schedule:
    # 30 min after the nightly builds start (builds run at 03:00 UTC)
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write  # push catalog.json to reports branch via GitHub API

jobs:
  catalog:
    name: Generate and publish catalog
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout main (images/ + integer.yaml)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Checkout reports branch (build reports)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: reports
          path: ./reports-branch
          sparse-checkout: reports
          sparse-checkout-cone-mode: false

      - name: Install mise
        uses: step-security/mise-action@d65cf9dcb78b983ae2530c89fd28e72286713505 # v3.5.1
        with:
          install: true
          cache: true

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/dev/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Build verity CLI
        run: go build -o verity .

      - name: Generate catalog.json
        run: |
          ./verity integer catalog \
            --images-dir images \
            --reports-dir reports-branch/reports \
            --output catalog.json

          echo "✓ $(jq '.images | length' catalog.json) images in catalog"
          jq -r '.images[] | "  \(.name): \(.versions | length) version(s)"' catalog.json

      - name: Push catalog.json to reports branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/push-integer-catalog.sh catalog.json
