name: Integer Orchestrator

on:
  schedule:
    # Daily at 03:00 UTC (offset from verity's 02:00 to avoid resource contention)
    - cron: "0 3 * * *"
  push:
    branches: [main]
    paths:
      - "images/*.yaml"
      - "images/_base/*.yaml"
      - "integer.yaml"
      - ".github/workflows/integer-orchestrator.yaml"
      - ".github/workflows/integer-build-image.yaml"
  workflow_dispatch:
    inputs:
      image:
        description: "Image name to build (empty = all)"
        required: false
        default: ""

permissions:
  contents: read
  actions: write    # required to dispatch integer-build-image.yaml

jobs:
  # ── Job 1: Detect changed images (push only) ──────────────────────
  detect:
    name: Detect Changes
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
      filter: ${{ steps.detect.outputs.filter }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect which images changed
        id: detect
        run: |
          changed=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")

          if echo "$changed" | grep -qE '^(integer\.yaml|images/_base/)'; then
            echo "Base config or base images changed — rebuild all"
            echo "mode=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          names=$(echo "$changed" \
            | grep '^images/' | grep -v '_base/' \
            | sed 's|images/||;s|\.yaml||' \
            | paste -sd, || true)

          if [ -z "$names" ]; then
            echo "No image YAML files changed — workflow files only, run all"
            echo "mode=all" >> "$GITHUB_OUTPUT"
          else
            echo "Changed images: $names"
            echo "mode=filter" >> "$GITHUB_OUTPUT"
            echo "filter=$names" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: Discover image+version+type combos ─────────────────────
  discover:
    name: Discover images
    needs: detect
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.discover.outputs.images }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: step-security/mise-action@d65cf9dcb78b983ae2530c89fd28e72286713505 # v3.5.1
        with:
          install: true
          cache: true

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/dev/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Login to GHCR
        uses: step-security/docker-login-action@c3e677aae8393bc9c81cfdf9709648720ea4bd4d # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build verity CLI
        run: go build -o verity .

      - name: Discover image×version×type combos
        id: discover
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DETECT_MODE: ${{ needs.detect.outputs.mode }}
          DETECT_FILTER: ${{ needs.detect.outputs.filter }}
          DISPATCH_IMAGE: ${{ github.event.inputs.image }}
        run: |
          EXTRA_FLAGS=""

          if [ "${{ github.event_name }}" = "schedule" ]; then
            EXTRA_FLAGS="--preflight true --github-repo ${{ github.repository }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$DISPATCH_IMAGE" ]; then
            EXTRA_FLAGS="--only $DISPATCH_IMAGE"
          elif [ "${{ github.event_name }}" = "push" ] && [ "$DETECT_MODE" = "filter" ] && [ -n "$DETECT_FILTER" ]; then
            EXTRA_FLAGS="--only $DETECT_FILTER"
          fi

          # shellcheck disable=SC2086
          all=$(./verity integer discover $EXTRA_FLAGS)

          count=$(echo "$all" | jq 'length')
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "images=$(echo "$all" | jq -c .)" >> "$GITHUB_OUTPUT"

          echo "✓ Discovered ${count} image+version+type combos"
          echo "$all" | jq -r '.[] | "  - \(.name):\(.version)-\(.type) → \(.registry)/\(.name):\(.tags[0])"'

  dispatch:
    name: Dispatch builds
    needs: discover
    runs-on: ubuntu-latest
    if: needs.discover.outputs.count != '0'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Dispatch integer-build-image.yaml for each image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGES: ${{ needs.discover.outputs.images }}
        run: |
          echo "$IMAGES" | jq -c '.[]' | while IFS= read -r image; do
            NAME=$(echo "$image" | jq -r '.name')
            VERSION=$(echo "$image" | jq -r '.version')
            TYPE=$(echo "$image" | jq -r '.type')
            TAGS=$(echo "$image" | jq -r '[.tags[]] | join(",")')
            REGISTRY=$(echo "$image" | jq -r '.registry')

            # Validate field values before shell interpolation
            for field in "$NAME" "$VERSION" "$TYPE" "$REGISTRY"; do
              if [[ ! "$field" =~ ^[a-zA-Z0-9][a-zA-Z0-9.:/_-]*$ ]]; then
                echo "Unsafe field value rejected: ${field}" >&2
                exit 1
              fi
            done
            if [[ ! "$TAGS" =~ ^[a-zA-Z0-9.,_-]+$ ]]; then
              echo "Unsafe tags value rejected: ${TAGS}" >&2
              exit 1
            fi

            echo "Dispatching build for ${NAME}:${VERSION}-${TYPE}..."
            gh workflow run integer-build-image.yaml \
              --repo "${{ github.repository }}" \
              --ref "${{ github.ref_name }}" \
              --field "image=${NAME}" \
              --field "version=${VERSION}" \
              --field "type=${TYPE}" \
              --field "tags=${TAGS}" \
              --field "registry=${REGISTRY}"

            # Throttle to avoid GitHub API rate limits
            sleep 1
          done
          echo "✓ Dispatched ${{ needs.discover.outputs.count }} build runs"
