# verity.yaml — verity-specific configuration
#
# This file holds settings that belong neither in Copa's copa-config.yaml
# nor in the standard Helm Chart.yaml.

# Tag variant overrides for chart-sourced images.
# Key: partial image path to match. If an image ref contains this string
# and its tag ends with "-<from>", the tag suffix is replaced with "-<to>".
overrides:
  "timberio/vector":
    from: "distroless-libc"
    to: "debian"
    valuePath: "image"  # explicit hint for chart-gen value path resolution

# Image replacements for chart-gen.
# Maps upstream image path patterns to Verity Integer (Wolfi) images.
# When chart-gen discovers a chart image matching the key, it generates
# an override pointing to the replacement image instead of looking for
# a Copa-patched version.
replacements:
  "kube-state-metrics/kube-state-metrics":
    registry: "ghcr.io/verity-org"
    image: "kube-state-metrics"
  "prometheus/pushgateway":
    registry: "ghcr.io/verity-org"
    image: "pushgateway"
