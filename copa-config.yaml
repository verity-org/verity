apiVersion: copa.sh/v1alpha1
kind: PatchConfig

# Standalone images to patch. Chart-sourced images are declared in Chart.yaml
# (dependencies:) and picked up automatically by `verity discover`.
#
# NOTE: Basic core images (node, python, golang, nginx, postgres, etc.) are
# maintained as zero-CVE Wolfi rebuilds in github.com/verity-org/integer.
# Only complex upstream images that cannot be trivially rebuilt from Wolfi
# packages belong here.
target:
  registry: "ghcr.io/verity-org"

images:

  # ============================================================================
  #  BASE / STATIC IMAGES
  # ============================================================================

  - name: "static-distroless"
    image: "gcr.io/distroless/static"
    platforms: ["linux/amd64", "linux/arm64"]
    tags:
      strategy: "pattern"
      pattern: '^\d{4}-\d{2}-\d{2}.*$'
      maxTags: 3

  # ============================================================================
  #  LANGUAGE RUNTIMES & SDKs
  # ============================================================================

  - name: "graalvm-native-image"
    image: "ghcr.io/graalvm/native-image"
    platforms: ["linux/amd64", "linux/arm64"]
    tags:
      strategy: "pattern"
      pattern: '^\d+\.\d+\.\d+$'
      maxTags: 3

  # ============================================================================
