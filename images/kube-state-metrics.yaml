name: kube-state-metrics
description: "Kubernetes cluster state metrics exporter — Wolfi rebuild replaces distroless base"
upstream:
  package: "kube-state-metrics"

types:
  default:
    base: wolfi-base
    packages: ["kube-state-metrics"]
    entrypoint: /usr/bin/kube-state-metrics
    paths:
      - {path: /tmp, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "2.18": {}
