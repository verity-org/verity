name: helm
description: "Helm Kubernetes package manager — Copa can't patch Alpine-based official image; Wolfi rebuild"
upstream:
  package: "helm-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["helm-{{version}}"]
    entrypoint: /usr/bin/helm
    work-dir: /workspace
    paths:
      - {path: /workspace, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  fips:
    base: wolfi-base
    packages: ["helm-{{version}}"]
    entrypoint: /usr/bin/helm
    work-dir: /workspace
    environment:
      GODEBUG: "fips140=on"
    paths:
      - {path: /workspace, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
    melange:
      upstream: "helm"
      env-file: "fips.env"

versions:
  "3":
    skip-types: [fips]
  "4": {}
