name: telegraf
description: "Telegraf metrics agent — Wolfi rebuild targets Debian CVEs from official image"
upstream:
  package: "telegraf-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["telegraf-{{version}}"]
    entrypoint: /usr/bin/telegraf
    paths:
      - {path: /etc/telegraf, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "1.37": {}
