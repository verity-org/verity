name: postgres
description: "PostgreSQL — Copa leaves 167 unfixable CVEs (linux-libc-dev, binutils); Wolfi rebuild from source"
upstream:
  package: "postgresql-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["postgresql-{{version}}", "postgresql-{{version}}-client"]
    entrypoint: postgres
    work-dir: /var/lib/postgresql
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      LANG: en_US.utf8
      PG_MAJOR: "{{version}}"
    paths:
      - {path: /var/lib/postgresql, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /var/lib/postgresql/data, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /var/run/postgresql, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /docker-entrypoint-initdb.d, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  fips:
    base: wolfi-fips
    packages: ["postgresql-{{version}}", "postgresql-{{version}}-client"]
    entrypoint: postgres
    work-dir: /var/lib/postgresql
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      LANG: en_US.utf8
      PG_MAJOR: "{{version}}"
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
    paths:
      - {path: /var/lib/postgresql, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /var/lib/postgresql/data, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /var/run/postgresql, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /docker-entrypoint-initdb.d, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "14": {}
  "15": {}
  "16": {}
  "17": {}
  "18":
    latest: true
