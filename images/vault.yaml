name: vault
description: "HashiCorp Vault secrets manager — Wolfi rebuild targets Debian CVEs"
upstream:
  package: vault

types:
  default:
    base: wolfi-base
    packages: ["vault"]
    entrypoint: vault server
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ""
      HOME: /home/vault
    paths:
      - {path: /vault/config, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /vault/data, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /vault/logs, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /home/vault, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  fips:
    base: wolfi-fips
    packages: ["vault"]
    entrypoint: vault server
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ""
      HOME: /home/vault
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
    paths:
      - {path: /vault/config, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /vault/data, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /vault/logs, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /home/vault, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "1": {}
