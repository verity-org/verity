name: vector
description: "Vector observability pipeline — Copa can't patch Alpine variant; Wolfi rebuild covers both"
upstream:
  package: vector

types:
  default:
    base: wolfi-base
    packages: ["vector"]
    entrypoint: /usr/bin/vector
    paths:
      - {path: /etc/vector, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /var/lib/vector, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "0": {}
