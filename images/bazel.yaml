name: bazel
description: "Bazel build system — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "bazel-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["bazel-{{version}}"]
    entrypoint: /usr/bin/bazel
    paths:
      - {path: /home/bazel, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "9":
    latest: true
