name: caddy
description: "Caddy web server — Wolfi rebuild with automatic HTTPS and zero-CVE base"
upstream:
  package: caddy

types:
  default:
    base: wolfi-base
    packages: ["caddy"]
    entrypoint: "caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"
    environment:
      XDG_DATA_HOME: /data
      XDG_CONFIG_HOME: /config
    paths:
      - {path: /etc/caddy, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /data/caddy, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /config/caddy, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /usr/share/caddy, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  fips:
    base: wolfi-fips
    packages: ["caddy"]
    entrypoint: "caddy"
    environment:
      XDG_DATA_HOME: /data
      XDG_CONFIG_HOME: /config
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
    paths:
      - {path: /etc/caddy, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /data/caddy, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /config/caddy, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /usr/share/caddy, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "2.11": {}
