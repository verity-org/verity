name: powershell
description: "PowerShell — Wolfi rebuild targets upstream CVEs"
upstream:
  package: powershell

types:
  default:
    base: wolfi-base
    packages: ["powershell"]
    entrypoint: /usr/bin/pwsh
    paths:
      - {path: /home/nonroot, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "7":
    latest: true
