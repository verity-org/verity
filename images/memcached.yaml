name: memcached
description: "Memcached in-memory cache — Wolfi rebuild targets persistent Debian CVEs"
upstream:
  package: memcached

types:
  default:
    base: wolfi-base
    packages: ["memcached", "libevent"]
    entrypoint: memcached
    paths:
      - {path: /var/run/memcached, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "1":
    latest: true
