name: gradle
description: "Gradle build tool — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "gradle-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["gradle-{{version}}"]
    entrypoint: /usr/bin/gradle
    environment:
      GRADLE_USER_HOME: /home/gradle
    paths:
      - {path: /home/gradle, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "9":
    latest: true
