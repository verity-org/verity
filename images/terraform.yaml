name: terraform
description: "OpenTofu (Terraform-compatible) — Copa can't patch Alpine; Wolfi rebuild of BSL-free fork"
upstream:
  package: "opentofu-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["opentofu-{{version}}"]
    entrypoint: /usr/bin/tofu
    work-dir: /workspace
    paths:
      - {path: /workspace, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "1.10":
    {}
  "1.11": {}
