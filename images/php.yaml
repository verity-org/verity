name: php
description: "PHP runtime — Copa leaves unfixable CVEs in Debian base; Wolfi rebuilds from source"
upstream:
  package: "php-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["php-{{version}}", "php-{{version}}-mbstring", "php-{{version}}-openssl", "php-{{version}}-curl"]
    entrypoint: /usr/bin/php
    work-dir: /app
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  fpm:
    base: wolfi-base
    packages:
      - "php-{{version}}"
      - "php-{{version}}-fpm"
      - "php-{{version}}-mbstring"
      - "php-{{version}}-openssl"
      - "php-{{version}}-curl"
      - "php-{{version}}-pdo"
      - "php-{{version}}-pdo_mysql"
      - "php-{{version}}-pdo_pgsql"
    entrypoint: "/usr/sbin/php-fpm{{version}} -F"
    work-dir: /app
    environment:
      PHP_INI_SCAN_DIR: "/etc/php/{{version}}/fpm/conf.d"
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /var/run/php, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  dev:
    base: wolfi-dev
    packages:
      - "php-{{version}}"
      - "php-{{version}}-dev"
      - "php-{{version}}-mbstring"
      - "php-{{version}}-openssl"
      - "php-{{version}}-curl"
      - "php-{{version}}-pdo"
      - composer
      - build-base
      - git
    entrypoint: /usr/bin/php
    work-dir: /app
    paths:
      - {path: /app, type: directory, uid: 0, gid: 0, permissions: 0o755}

  fips:
    base: wolfi-fips
    packages: ["php-{{version}}", "php-{{version}}-mbstring", "php-{{version}}-openssl", "php-{{version}}-curl"]
    entrypoint: /usr/bin/php
    work-dir: /app
    environment:
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "8.2": {}
  "8.3": {}
  "8.4": {}
  "8.5":
    latest: true
