name: cosign
description: "Sigstore cosign — Copa can't patch distroless-based official image; Wolfi rebuild"
upstream:
  package: cosign

types:
  default:
    base: wolfi-base
    packages: ["cosign"]
    entrypoint: /usr/bin/cosign

  fips:
    base: wolfi-base
    packages: ["cosign"]
    entrypoint: /usr/bin/cosign
    environment:
      GODEBUG: "fips140=on"
    melange:
      upstream: "cosign"
      env-file: "fips.env"

versions:
  "2": {}
