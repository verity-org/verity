name: cosign
description: "Sigstore cosign — Copa can't patch distroless-based official image; Wolfi rebuild"
upstream:
  package: cosign

types:
   default:
     base: wolfi-base
     packages: ["cosign"]
     entrypoint: /usr/bin/cosign

   fips:
     base: wolfi-fips
     packages: ["cosign"]
     entrypoint: /usr/bin/cosign
     environment:
       OPENSSL_MODULES: /usr/lib/ossl-modules
       OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

versions:
  "2": {}
