name: clickhouse
description: "ClickHouse column-oriented database — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "clickhouse-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["clickhouse-{{version}}"]
    entrypoint: /usr/bin/clickhouse-server
    paths:
      - {path: /var/lib/clickhouse, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /var/log/clickhouse-server, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /etc/clickhouse-server, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "26.1": {}
