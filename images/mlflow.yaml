name: mlflow
description: "MLflow ML platform — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "mlflow"

types:
  default:
    base: wolfi-base
    packages: ["mlflow"]
    entrypoint: /usr/bin/mlflow
    environment:
      MLFLOW_TRACKING_URI: /mlflow
    paths:
      - {path: /mlflow, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "2":
    latest: true
