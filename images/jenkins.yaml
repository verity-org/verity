name: jenkins
description: "Jenkins CI server — Wolfi rebuild targets persistent Debian CVEs"
upstream:
  package: "jenkins-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["jenkins-{{version}}"]
    entrypoint: /usr/bin/java -jar /usr/share/java/jenkins/jenkins.war
    environment:
      JENKINS_HOME: /var/jenkins_home
      JAVA_HOME: /usr/lib/jvm/default-jvm
    paths:
      - {path: /var/jenkins_home, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /usr/share/jenkins/ref, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "2":
    latest: true
