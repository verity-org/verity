name: dotnet
description: ".NET runtime and SDK — drop-in for dotnet/sdk, dotnet/runtime, dotnet/aspnet; Wolfi rebuild"
upstream:
  package: "dotnet-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["dotnet-{{version}}-runtime"]
    entrypoint: /usr/bin/dotnet
    work-dir: /app
    environment:
      DOTNET_RUNNING_IN_CONTAINER: "true"
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  sdk:
    base: wolfi-base
    packages: ["dotnet-{{version}}", "dotnet-{{version}}-sdk"]
    entrypoint: /usr/bin/dotnet
    work-dir: /app
    environment:
      DOTNET_RUNNING_IN_CONTAINER: "true"
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      NUGET_XMLDOC_MODE: skip
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /root/.nuget, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  aspnet:
    base: wolfi-base
    packages: ["dotnet-{{version}}-runtime", "aspnet-{{version}}-runtime"]
    entrypoint: /usr/bin/dotnet
    work-dir: /app
    environment:
      DOTNET_RUNNING_IN_CONTAINER: "true"
      ASPNETCORE_URLS: "http://+:8080"
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  sdk-fips:
    base: wolfi-fips
    packages: ["dotnet-{{version}}", "dotnet-{{version}}-sdk"]
    entrypoint: /usr/bin/dotnet
    work-dir: /app
    environment:
      DOTNET_RUNNING_IN_CONTAINER: "true"
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "false"
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "8": {}
  "9": {}
  "10": {}
