name: coredns
description: "CoreDNS — Copa can't patch scratch-based official image; Wolfi rebuild"
upstream:
  package: coredns

types:
  default:
    base: wolfi-base
    packages: ["coredns-1.14"]
    entrypoint: /usr/bin/coredns
    paths:
      - {path: /etc/coredns, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "1": {}
