name: fluent-bit
description: "Fluent Bit log processor — Wolfi rebuild targets persistent CVEs in official image"
upstream:
  package: "fluent-bit-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["fluent-bit-{{version}}"]
    entrypoint: /usr/bin/fluent-bit
    paths:
      - {path: /etc/fluent-bit, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "3.2":
    {}
  "4.2":
    latest: true
