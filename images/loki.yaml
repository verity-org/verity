name: loki
description: "Grafana Loki log aggregation — Wolfi rebuild targets Debian CVEs"
upstream:
  package: "loki-{{version}}"

types:
   default:
     base: wolfi-base
     packages: ["loki-{{version}}"]
     entrypoint: /usr/bin/loki
     paths:
       - {path: /etc/loki, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
       - {path: /var/lib/loki, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

   fips:
     base: wolfi-fips
     packages: ["loki-{{version}}"]
     entrypoint: /usr/bin/loki
     environment:
       OPENSSL_MODULES: /usr/lib/ossl-modules
       OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
     paths:
       - {path: /etc/loki, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
       - {path: /var/lib/loki, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "3.5":
    {}
  "3.6": {}
