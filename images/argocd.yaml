name: argocd
description: "Argo CD GitOps controller — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "argo-cd-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["argo-cd-{{version}}"]
    entrypoint: /usr/bin/argocd
    paths:
      - {path: /home/argocd, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /app/config, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "3.3":
    latest: true
