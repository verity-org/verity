name: crane
description: "crane OCI registry tool — Copa can't patch distroless-based official image; Wolfi rebuild"
upstream:
  package: crane

types:
  default:
    base: wolfi-base
    packages: ["crane"]
    entrypoint: /usr/bin/crane

  fips:
    base: wolfi-base
    packages: ["crane"]
    entrypoint: /usr/bin/crane
    environment:
      GODEBUG: "fips140=on"
    melange:
      upstream: "crane"
      env-file: "fips.env"

versions:
  "0": {}
