name: crane
description: "crane OCI registry tool — Copa can't patch distroless-based official image; Wolfi rebuild"
upstream:
  package: crane

types:
   default:
     base: wolfi-base
     packages: ["crane"]
     entrypoint: /usr/bin/crane

   fips:
     base: wolfi-fips
     packages: ["crane"]
     entrypoint: /usr/bin/crane
     environment:
       OPENSSL_MODULES: /usr/lib/ossl-modules
       OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

versions:
  "0": {}
