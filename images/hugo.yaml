name: hugo
description: "Hugo static site generator — Wolfi rebuild targets upstream CVEs"
upstream:
  package: hugo

types:
  default:
    base: wolfi-base
    packages: ["hugo"]
    entrypoint: /usr/bin/hugo
    paths:
      - {path: /src, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "0":
    latest: true
