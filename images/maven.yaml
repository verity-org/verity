name: maven
description: "Apache Maven build tool — Wolfi rebuild on top of OpenJDK 21"
upstream:
  package: maven

types:
  default:
    base: wolfi-base
    packages: ["maven-3.9", "openjdk-21", "openjdk-21-default-jvm"]
    entrypoint: /usr/bin/mvn
    work-dir: /app
    environment:
      JAVA_HOME: /usr/lib/jvm/java-21-openjdk
      MAVEN_HOME: /usr/share/java/maven
      PATH: /usr/lib/jvm/java-21-openjdk/bin:/usr/share/java/maven/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /root/.m2, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "3":
    latest: true
