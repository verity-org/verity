name: deno
description: "Deno JavaScript/TypeScript runtime — Wolfi rebuild; official image is Debian-based"
upstream:
  package: deno

types:
  default:
    base: wolfi-base
    packages: ["deno"]
    entrypoint: /usr/bin/deno
    work-dir: /app
    environment:
      DENO_DIR: /deno-dir
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /deno-dir, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "2": {}
