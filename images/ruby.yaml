name: ruby
description: "Ruby runtime — Copa leaves unfixable CVEs in Debian base; Wolfi rebuilds from source"
upstream:
  package: "ruby-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["ruby-{{version}}", "libstdc++"]
    entrypoint: /usr/bin/ruby
    work-dir: /app
    environment:
      BUNDLE_SILENCE_ROOT_WARNING: "1"
      BUNDLE_APP_CONFIG: /usr/local/bundle
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /usr/local/bundle, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  dev:
    base: wolfi-dev
    packages: ["ruby-{{version}}", "ruby-{{version}}-dev", "libstdc++", "build-base", "git"]
    entrypoint: /usr/bin/ruby
    work-dir: /app
    environment:
      BUNDLE_SILENCE_ROOT_WARNING: "1"
      BUNDLE_APP_CONFIG: /usr/local/bundle
    paths:
      - {path: /app, type: directory, uid: 0, gid: 0, permissions: 0o755}
      - {path: /usr/local/bundle, type: directory, uid: 0, gid: 0, permissions: 0o755}

  fips:
    base: wolfi-fips
    packages: ["ruby-{{version}}", "libstdc++"]
    entrypoint: /usr/bin/ruby
    work-dir: /app
    environment:
      BUNDLE_SILENCE_ROOT_WARNING: "1"
      BUNDLE_APP_CONFIG: /usr/local/bundle
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /usr/local/bundle, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "3.2": {}
  "3.3": {}
  "3.4": {}
  "4.0":
    latest: true
