name: erlang
description: "Erlang/OTP runtime — Wolfi rebuild; official image is Debian-based with persistent unfixable CVEs"
upstream:
  package: erlang

types:
  default:
    base: wolfi-base
    packages: ["erlang-{{version}}"]
    entrypoint: /usr/bin/erl
    work-dir: /app
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  dev:
    base: wolfi-dev
    packages: ["erlang-{{version}}", "erlang-{{version}}-dev", "rebar3", "build-base", "git"]
    entrypoint: /usr/bin/erl
    work-dir: /app
    paths:
      - {path: /app, type: directory, uid: 0, gid: 0, permissions: 0o755}

  fips:
    base: wolfi-fips
    packages: ["erlang-{{version}}"]
    entrypoint: /usr/bin/erl
    work-dir: /app
    environment:
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "26": {}
  "27": {}
  "28":
    latest: true
