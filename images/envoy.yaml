name: envoy
description: "Envoy proxy — Wolfi rebuild; official image ships with unfixable CVEs"
upstream:
  package: "envoy-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["envoy-{{version}}", "envoy-{{version}}-config", "envoy-{{version}}-oci-entrypoint"]
    entrypoint: /usr/bin/envoy
    paths:
      - {path: /etc/envoy, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "1.37":
    latest: true
