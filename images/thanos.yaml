name: thanos
description: "Thanos long-term Prometheus storage — Copa's -distroless still has unfixable CVEs; Wolfi rebuild"
upstream:
  package: thanos

types:
  default:
    base: wolfi-base
    packages: ["thanos"]
    entrypoint: /usr/bin/thanos
    paths:
      - {path: /etc/thanos, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /var/lib/thanos, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  fips:
    base: wolfi-base
    packages: ["thanos"]
    entrypoint: /usr/bin/thanos
    environment:
      GODEBUG: "fips140=on"
    paths:
      - {path: /etc/thanos, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /var/lib/thanos, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
    melange:
      upstream: "thanos"
      env-file: "fips.env"

versions:
  "0": {}
