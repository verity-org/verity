name: tomcat
description: "Apache Tomcat servlet container — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "tomcat-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["tomcat-{{version}}"]
    entrypoint: /usr/share/tomcat/bin/catalina.sh run
    environment:
      CATALINA_HOME: /usr/share/tomcat
      CATALINA_BASE: /usr/share/tomcat
    paths:
      - {path: /usr/share/tomcat/webapps, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /usr/share/tomcat/logs, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /usr/share/tomcat/temp, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /usr/share/tomcat/work, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "11.0":
    latest: true
