name: zookeeper
description: "Apache ZooKeeper coordination service — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "zookeeper-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["zookeeper-{{version}}"]
    entrypoint: /usr/bin/zkServer.sh start-foreground
    environment:
      ZOO_DATA_DIR: /data
      ZOO_LOG_DIR: /datalog
      ZOO_CONF_DIR: /conf
    paths:
      - {path: /data, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /datalog, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /conf, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "3.9": {}
