name: alertmanager
description: "Prometheus Alertmanager — Copa uses -distroless variant but leaves unfixable CVEs; Wolfi rebuild"
upstream:
  package: prometheus-alertmanager

types:
  default:
    base: wolfi-base
    packages: ["prometheus-alertmanager"]
    entrypoint: /usr/bin/alertmanager
    paths:
      - {path: /etc/alertmanager, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /alertmanager, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  fips:
    base: wolfi-base
    packages: ["prometheus-alertmanager"]
    entrypoint: /usr/bin/alertmanager
    environment:
      GODEBUG: "fips140=on"
    paths:
      - {path: /etc/alertmanager, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /alertmanager, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
    melange:
      upstream: "prometheus-alertmanager"
      env-file: "fips.env"

versions:
  "0": {}
