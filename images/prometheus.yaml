name: prometheus
description: "Prometheus monitoring — Copa's -distroless still has unfixable CVEs; Wolfi rebuild"
upstream:
  package: "prometheus-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["prometheus-{{version}}"]
    entrypoint: /usr/bin/prometheus
    paths:
      - {path: /etc/prometheus, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /prometheus, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "2.55":
    {}
  "3.9":
    latest: true
