name: influxdb
description: "InfluxDB time-series database — Wolfi rebuild targets Debian CVEs"
upstream:
  package: "influxd-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["influxd-{{version}}"]
    entrypoint: /usr/bin/influxd
    paths:
      - {path: /var/lib/influxdb2, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /etc/influxdb2, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "2.7":
    {}
  "3.8":
    latest: true
