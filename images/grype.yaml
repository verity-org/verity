name: grype
description: "Anchore Grype vulnerability scanner — Copa can't patch scratch-based official image; Wolfi rebuild"
upstream:
  package: grype

types:
  default:
    base: wolfi-base
    packages: ["grype"]
    entrypoint: /usr/bin/grype
    paths:
      - {path: /root/.cache/grype, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "0": {}
