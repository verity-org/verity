name: wordpress
description: "WordPress CMS — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "wordpress"

types:
  default:
    base: wolfi-base
    packages: ["wordpress"]
    entrypoint: /usr/sbin/httpd -D FOREGROUND
    paths:
      - {path: /var/www/html, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /var/www/html/wp-content, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "6": {}
