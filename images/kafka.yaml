name: kafka
description: "Apache Kafka message broker — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "kafka-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["kafka-{{version}}"]
    entrypoint: /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties
    environment:
      KAFKA_HOME: /opt/kafka
    paths:
      - {path: /opt/kafka/data, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /opt/kafka/logs, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /opt/kafka/config, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "4.2":
    latest: true
