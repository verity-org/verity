name: nginx
description: "Nginx web server — Copa leaves unfixable CVEs in Debian nginx; Wolfi rebuild from source"
upstream:
  package: nginx

types:
  default:
    base: wolfi-base
    packages: ["nginx-mainline"]
    entrypoint: /usr/sbin/nginx -g "daemon off;"
    environment:
      NGINX_VERSION: "{{version}}"
    paths:
      - {path: /var/cache/nginx, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /var/log/nginx, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /etc/nginx/conf.d, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /usr/share/nginx/html, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  fips:
    base: wolfi-fips
    packages: ["nginx-mainline"]
    entrypoint: /usr/sbin/nginx -g "daemon off;"
    environment:
      NGINX_VERSION: "{{version}}"
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
    paths:
      - {path: /var/cache/nginx, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /var/log/nginx, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /etc/nginx/conf.d, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /usr/share/nginx/html, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "1.28":
    {}
  "1.29": {}
