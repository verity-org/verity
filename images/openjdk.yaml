name: openjdk
description: "OpenJDK — drop-in for eclipse-temurin; Wolfi rebuild from source with <24hr CVE response"
upstream:
  package: "openjdk-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["openjdk-{{version}}", "openjdk-{{version}}-default-jvm"]
    entrypoint: /usr/bin/java
    work-dir: /app
    environment:
      JAVA_HOME: /usr/lib/jvm/java-{{version}}-openjdk
      PATH: /usr/lib/jvm/java-{{version}}-openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LANG: en_US.UTF-8
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  jre:
    base: wolfi-base
    packages: ["openjdk-{{version}}-jre", "openjdk-{{version}}-default-jvm"]
    entrypoint: /usr/bin/java
    work-dir: /app
    environment:
      JAVA_HOME: /usr/lib/jvm/java-{{version}}-openjdk
      PATH: /usr/lib/jvm/java-{{version}}-openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LANG: en_US.UTF-8
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  fips:
    base: wolfi-fips
    packages: ["openjdk-{{version}}", "openjdk-{{version}}-default-jvm"]
    entrypoint: /usr/bin/java
    work-dir: /app
    environment:
      JAVA_HOME: /usr/lib/jvm/java-{{version}}-openjdk
      PATH: /usr/lib/jvm/java-{{version}}-openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LANG: en_US.UTF-8
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
      JAVA_TOOL_OPTIONS: >-
        -Dcom.sun.net.ssl.checkRevocation=false
        -Djava.security.properties=/etc/java-{{version}}-openjdk/security/java.security.fips
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "17": {}
  "21": {}
  "25": {}
