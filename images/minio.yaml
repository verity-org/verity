name: minio
description: "MinIO object storage server — Wolfi rebuild targets CVEs from official image"
upstream:
  package: minio

types:
  default:
    base: wolfi-base
    packages: ["minio"]
    entrypoint: minio server /data
    paths:
      - {path: /data, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "RELEASE": {}
