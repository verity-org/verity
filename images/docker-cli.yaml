name: docker-cli
description: "Docker CLI — Wolfi rebuild targets upstream CVEs"
upstream:
  package: docker-cli

types:
  default:
    base: wolfi-base
    packages: ["docker-cli"]
    entrypoint: /usr/bin/docker

  fips:
    base: wolfi-base
    packages: ["docker-cli"]
    entrypoint: /usr/bin/docker
    environment:
      GODEBUG: "fips140=on"
    melange:
      upstream: "docker-cli"
      env-file: "fips.env"

versions:
  "27": {}
