name: docker-cli
description: "Docker CLI — Wolfi rebuild targets upstream CVEs"
upstream:
  package: docker-cli

types:
  default:
    base: wolfi-base
    packages: ["docker-cli"]
    entrypoint: /usr/bin/docker

  fips:
    base: wolfi-fips
    packages: ["docker-cli"]
    entrypoint: /usr/bin/docker
    environment:
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

versions:
  "27": {}
