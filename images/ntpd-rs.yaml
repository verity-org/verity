name: ntpd-rs
description: "ntpd-rs NTP daemon — Wolfi rebuild targets upstream CVEs"
upstream:
  package: ntpd-rs

types:
  default:
    base: wolfi-base
    packages: ["ntpd-rs"]
    entrypoint: /usr/bin/ntp-daemon
    paths:
      - {path: /etc/ntpd-rs, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /var/lib/ntpd-rs, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "1": {}
