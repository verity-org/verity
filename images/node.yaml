name: node
description: "Node.js runtime — minimal Wolfi-based image"
upstream:
  package: "nodejs-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["nodejs-{{version}}", "libstdc++"]
    entrypoint: /usr/bin/node
    work-dir: /app
    environment:
      NODE_ENV: production
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  dev:
    base: wolfi-dev
    packages: ["nodejs-{{version}}", "npm", "libstdc++", "python3-as-3.13", "build-base", "git"]
    entrypoint: /usr/bin/node
    work-dir: /app
    environment:
      NODE_ENV: development
    paths:
      - {path: /app, type: directory, uid: 0, gid: 0, permissions: 0o755}

  fips:
    base: wolfi-fips
    packages: ["nodejs-{{version}}", "libstdc++"]
    entrypoint: /usr/bin/node
    work-dir: /app
    environment:
      NODE_ENV: production
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
      NODE_OPTIONS: "--openssl-config=/etc/ssl/openssl-fips.cnf"
    paths:
      - {path: /app, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "20": {}
  "22": {}
  "24": {}
