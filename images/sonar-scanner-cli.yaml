name: sonar-scanner-cli
description: "SonarQube Scanner CLI — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "sonar-scanner-cli"

types:
  default:
    base: wolfi-base
    packages: ["sonar-scanner-cli"]
    entrypoint: /usr/bin/sonar-scanner
    work-dir: /usr/src
    paths:
      - {path: /usr/src, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "7":
    latest: true
