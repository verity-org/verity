name: httpd
description: "Apache HTTP Server — Wolfi rebuild; official image is Debian-based with persistent CVEs"
upstream:
  package: apache2

types:
  default:
    base: wolfi-base
    packages: ["apache2", "apache2-utils"]
    entrypoint: "httpd -DFOREGROUND"
    paths:
      - {path: /var/www/html, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /var/log/apache2, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /var/run/apache2, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  fips:
    base: wolfi-fips
    packages: ["apache2", "apache2-utils"]
    entrypoint: "httpd -DFOREGROUND"
    environment:
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
    paths:
      - {path: /var/www/html, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /var/log/apache2, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /var/run/apache2, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "2.4": {}
