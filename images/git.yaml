name: git
description: "Git — Copa can't patch Alpine-based official image (alpine/git); Wolfi rebuild"
upstream:
  package: git

types:
  default:
    base: wolfi-base
    packages: ["git", "openssh-client", "ca-certificates-bundle"]
    entrypoint: /usr/bin/git
    work-dir: /workspace
    paths:
      - {path: /workspace, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "2": {}
