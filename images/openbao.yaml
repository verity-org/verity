name: openbao
description: "OpenBao secrets manager — Vault fork; Wolfi rebuild targets upstream CVEs"
upstream:
  package: openbao

types:
  default:
    base: wolfi-base
    packages: ["openbao"]
    entrypoint: /usr/bin/openbao server
    environment:
      HOME: /home/openbao
    paths:
      - {path: /openbao/config, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /openbao/data, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /openbao/logs, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /home/openbao, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "2": {}
