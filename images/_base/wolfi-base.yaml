annotations:
  org.opencontainers.image.vendor: "Verity"
  org.opencontainers.image.licenses: "Apache-2.0"
  org.opencontainers.image.source: "https://github.com/verity-org/verity"
  org.opencontainers.image.url: "https://github.com/verity-org/verity"

contents:
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  repositories:
    - https://packages.wolfi.dev/os
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle

accounts:
  run-as: 65532
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532

archs:
  - amd64
  - arm64
