include: images/_base/wolfi-base.yaml

# openssl-provider-fips was removed from the public Wolfi repo.
# FIPS images use OPENSSL_CONF/OPENSSL_MODULES env vars to point to the
# built-in OpenSSL 3.x FIPS provider, which is compiled into libcrypto.

environment:
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
