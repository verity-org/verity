name: sonarqube
description: "SonarQube code quality platform — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "sonarqube"

types:
  default:
    base: wolfi-base
    packages: ["sonarqube"]
    entrypoint: /opt/sonarqube/bin/run.sh
    environment:
      SONARQUBE_HOME: /opt/sonarqube
    paths:
      - {path: /opt/sonarqube/data, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /opt/sonarqube/extensions, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /opt/sonarqube/logs, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /opt/sonarqube/temp, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "10": {}
