name: grafana
description: "Grafana observability platform — Wolfi rebuild targets Debian CVEs from official image"
upstream:
  package: "grafana-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["grafana-{{version}}"]
    entrypoint: /usr/bin/grafana server
    environment:
      GF_PATHS_CONFIG: /etc/grafana/grafana.ini
      GF_PATHS_DATA: /var/lib/grafana
      GF_PATHS_LOGS: /var/log/grafana
      GF_PATHS_PLUGINS: /var/lib/grafana/plugins
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_PLUGINS_PLUGIN_ADMIN_ENABLED: "false"
    paths:
      - {path: /etc/grafana, type: directory, uid: 472, gid: 472, permissions: 0o755}
      - {path: /var/lib/grafana, type: directory, uid: 472, gid: 472, permissions: 0o755}
      - {path: /var/log/grafana, type: directory, uid: 472, gid: 472, permissions: 0o755}
      - {path: /etc/grafana/provisioning, type: directory, uid: 472, gid: 472, permissions: 0o755}
      - {path: /usr/share/grafana, type: directory, uid: 472, gid: 472, permissions: 0o755}


versions:
  "11.6": {}
  "12.4": {}
