name: keycloak
description: "Keycloak identity and access management — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "keycloak-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["keycloak-{{version}}"]
    entrypoint: /opt/keycloak/bin/kc.sh start
    environment:
      KC_HOME: /opt/keycloak
    paths:
      - {path: /opt/keycloak/data, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /opt/keycloak/conf, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /opt/keycloak/providers, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "26.5": {}
