name: traefik
description: "Traefik reverse proxy — Copa can't patch Alpine-based official image; Wolfi rebuild"
upstream:
  package: "traefik-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["traefik-{{version}}"]
    entrypoint: /usr/bin/traefik
    paths:
      - {path: /etc/traefik, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "3.6":
    latest: true
