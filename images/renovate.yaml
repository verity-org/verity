name: renovate
description: "Renovate dependency update bot — Wolfi rebuild targets upstream CVEs"
upstream:
  package: "renovate"

types:
  default:
    base: wolfi-base
    packages: ["renovate"]
    entrypoint: /usr/bin/renovate
    paths:
      - {path: /tmp/renovate, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "40": {}
